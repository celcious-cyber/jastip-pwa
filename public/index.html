<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <meta name="theme-color" content="#942E4D" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#942E4D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta
      name="description"
      content="Jastip App - Solusi manajemen pesanan, pembayaran, dan packing jastip dalam satu genggaman."
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Jastip App | Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

    <style>
      /* Splash Screen Sederhana saat aplikasi sedang loading awal */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        z-index: 9999;
      }
      .loader-dot {
        width: 12px;
        height: 12px;
        background-color: #942E4D;
        border-radius: 50%;
        margin: 0 4px;
        animation: bounce 0.6s infinite alternate;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce {
        from { transform: translateY(0); opacity: 1; }
        to { transform: translateY(-10px); opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <noscript>Anda perlu mengaktifkan JavaScript untuk menjalankan aplikasi ini.</noscript>
    
    <div id="initial-loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }, 500);
        }
      });
    </script>
  </body>
</html>
